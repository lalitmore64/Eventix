spring.application.name=tickets
spring.datasource.url=jdbc:mysql://localhost:3306/eventix?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin@123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# JWT Configuration
jwt.secret=${JWT_SECRET:yourSuperSecretSigningKeyAtLeast256BitsLongForHMACSHA256SignatureVerification!}

# Razorpay Configuration
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_mockKeyId}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:mockKeySecret}

