spring.application.name=tickets

spring.datasource.url=${SPRING_DATASOURCE_URL:${SQL_URL:jdbc:mysql://localhost:3306/eventix?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${SQL_USERNAME:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${SQL_PASSWORD:admin@123}}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://eventix-wheat.vercel.app
}

# JWT Configuration
jwt.secret=${JWT_SECRET:yourSuperSecretSigningKeyAtLeast256BitsLongForHMACSHA256SignatureVerification!}

# Razorpay Configuration
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

